version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: pchub_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pchub_root_pass
      MYSQL_DATABASE: pchub_db
      MYSQL_USER: pchub_user
      MYSQL_PASSWORD: pchub_pass
    ports:
      - "3306:3306"
    volumes:
      - pchub_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: pchub_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: pchub_root_pass
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  pchub_mysql_data:
